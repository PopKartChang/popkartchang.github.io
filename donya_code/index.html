<html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>変換マスタ - アップロードと検索</title>
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center">変換マスタの管理</h1>

        <!-- 分頁 -->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <a class="nav-link" id="query-tab" data-bs-toggle="tab" href="#query" role="tab" aria-controls="query" aria-selected="false">検索</a>
            </li>
            <li class="nav-item" role="presentation">
                <a class="nav-link" id="reverse-query-tab" data-bs-toggle="tab" href="#reverse-query" role="tab" aria-controls="reverse-query" aria-selected="false">逆検索</a>
            </li>
            <li class="nav-item" role="presentation">
                <a class="nav-link active" id="upload-tab" data-bs-toggle="tab" href="#upload" role="tab" aria-controls="upload" aria-selected="true">アップロード</a>
            </li>
        </ul>
        <div class="tab-content mt-4" id="myTabContent">
            <!-- 検索 -->
            <div class="tab-pane fade" id="query" role="tabpanel" aria-labelledby="query-tab">
                <h3>検索</h3>
                <div class="mb-3">
                    <label for="itemCode" class="form-label">商品コードを入力してください</label>
                    <input type="text" class="form-control" id="itemCode" placeholder="商品コードを入力">
                </div>
                <button class="btn btn-primary" id="searchBtn">検索</button>
                <h5 class="mt-3">検索結果</h5>
                <table class="table" id="queryResultTable">
                    <thead>
                        <tr>
                            <th>問屋コード</th>
                            <th>項目１</th>
                            <th>項目２</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <!-- 逆検索 -->
            <div class="tab-pane fade" id="reverse-query" role="tabpanel" aria-labelledby="reverse-query-tab">
                <h3>逆検索</h3>
                <div class="mb-3">
                    <label for="shouhinCode" class="form-label">問屋コードを入力してください</label>
                    <input type="text" class="form-control" id="shouhinCode" placeholder="問屋コードを入力">
                </div>
                <button class="btn btn-primary" id="reverseSearchBtn">逆検索</button>
                <h5 class="mt-3">検索結果</h5>
                <table class="table" id="reverseQueryResultTable">
                    <thead>
                        <tr>
                            <th>商品コード</th>
                            <th>項目１</th>
                            <th>項目２</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <!-- アップロード -->
            <div class="tab-pane fade active show" id="upload" role="tabpanel" aria-labelledby="upload-tab">
                <h3>変換マスタのアップロード</h3>
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="fileInput" class="form-label">ファイルを選択してください</label>
                        <input type="file" class="form-control" id="fileInput" name="file">
                    </div>
                    <button type="submit" class="btn btn-primary">アップロード</button>
                </form>
                <p class="mt-2" id="uploadStatus"></p>
                <p>最新のアップロード時間: <span id="upload-time">2026-02-17 09:33:19</span></p>
            </div>
        </div>
    </div>

   <script>
    // ！！！請將這裡替換成你剛剛複製的 GAS Web App URL ！！！
    const GAS_URL = "https://script.google.com/macros/s/AKfycby8jVOs2w2PyBo4Xpplsfr7Bl_0q-vkENbiHDih_iFxH3nY49zpYF2MvDpUSl1AH30M2w/exec";

    // 頁面載入時取得最新的更新時間
    window.onload = function() {
        fetch(`${GAS_URL}?action=get_status`)
        .then(response => response.json())
        .then(data => {
            document.getElementById("upload-time").innerText = data.time;
        });
    };

    // 上傳 CSV 檔案
    document.getElementById("uploadForm").addEventListener("submit", function(event) {
        event.preventDefault();
        
        const fileInput = document.getElementById("fileInput");
        if(fileInput.files.length === 0){
            alert("ファイルを選択してください (請選擇檔案)");
            return;
        }

        const file = fileInput.files[0];
        document.getElementById("uploadStatus").innerText = 'アップロード中... (上傳中，由於資料量大約需 10~20 秒)';

        const reader = new FileReader();
        reader.onload = function(e) {
            // 取得 base64 字串 (去除前綴 data:text/csv;base64,)
            const base64Data = e.target.result.split(',')[1];
            
            // 使用 text/plain 傳送 JSON 可以繞過瀏覽器的 CORS OPTIONS 限制
            fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    action: 'upload',
                    data: base64Data
                })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("uploadStatus").innerText = data.message;
                if(data.status === 'success') {
                    // 更新時間顯示
                    fetch(`${GAS_URL}?action=get_status`)
                    .then(res => res.json())
                    .then(resData => document.getElementById("upload-time").innerText = resData.time);
                }
            })
            .catch(error => {
                document.getElementById("uploadStatus").innerText = 'アップロード失敗';
                console.error('Error:', error);
            });
        };
        // 以 Base64 格式讀取檔案
        reader.readAsDataURL(file);
    });

    // 搜尋 (Query)
    document.getElementById("searchBtn").addEventListener("click", function() {
        let itemCode = document.getElementById("itemCode").value;
        if(!itemCode) return;

        fetch(`${GAS_URL}?action=query&item_code=${itemCode}`)
        .then(response => response.json())
        .then(data => {
            let tableBody = document.querySelector("#queryResultTable tbody");
            tableBody.innerHTML = '';
            data.forEach(row => {
                let tr = document.createElement('tr');
                tr.innerHTML = `<td>${row.Shouhin_Code}</td><td>${row.Color_Name}</td><td>${row.Size_Name}</td>`;
                tableBody.appendChild(tr);
            });
        });
    });

    // 逆搜尋 (Reverse Query)
    document.getElementById("reverseSearchBtn").addEventListener("click", function() {
        let shouhinCode = document.getElementById("shouhinCode").value;
        if(!shouhinCode) return;

        fetch(`${GAS_URL}?action=reverse_query&shouhin_code=${shouhinCode}`)
        .then(response => response.json())
        .then(data => {
            let tableBody = document.querySelector("#reverseQueryResultTable tbody");
            tableBody.innerHTML = '';
            data.forEach(row => {
                let tr = document.createElement('tr');
                tr.innerHTML = `<td>${row.Item_Code}</td><td>${row.Color_Name}</td><td>${row.Size_Name}</td>`;
                tableBody.appendChild(tr);
            });
        });
    });
</script>

</body></html>
