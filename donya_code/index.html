<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>変換マスタ - アップロードと検索</title>
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* ローディング中などのメッセージ用 */
        #systemAlert { display: none; }
    </style>
</head>
<body>
    <div class="container mt-4">
        
        <!-- ヘッダー部分（タイトル、手動更新ボタン、データバージョン表示） -->
        <div class="d-flex justify-content-between align-items-end mb-3 border-bottom pb-2">
            <h1 class="mb-0">変換マスタの管理</h1>
            <div class="text-end">
                <span class="text-muted fw-bold me-3" style="font-size: 0.9em;">
                    最新データバージョン: <span id="dataVersionText" class="text-primary">取得中...</span>
                </span>
                <button class="btn btn-outline-success btn-sm" id="manualUpdateBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-clockwise me-1" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
                        <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
                    </svg>手動更新
                </button>
            </div>
        </div>

        <!-- システムメッセージアラート -->
        <div id="systemAlert" class="alert alert-info" role="alert">
            データを読み込んでいます...
        </div>

        <!-- 分頁 -->
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <a class="nav-link active" id="query-tab" data-bs-toggle="tab" href="#query" role="tab" aria-controls="query" aria-selected="true">検索</a>
            </li>
            <li class="nav-item" role="presentation">
                <a class="nav-link" id="reverse-query-tab" data-bs-toggle="tab" href="#reverse-query" role="tab" aria-controls="reverse-query" aria-selected="false">逆検索</a>
            </li>
            <li class="nav-item" role="presentation">
                <a class="nav-link" id="upload-tab" data-bs-toggle="tab" href="#upload" role="tab" aria-controls="upload" aria-selected="false">アップロード</a>
            </li>
        </ul>
        
        <div class="tab-content mt-4" id="myTabContent">
            <!-- 検索 -->
            <div class="tab-pane fade active show" id="query" role="tabpanel" aria-labelledby="query-tab">
                <h3>検索</h3>
                <div class="mb-3">
                    <label for="itemCode" class="form-label">商品コードを入力してください</label>
                    <input type="text" class="form-control search-input" id="itemCode" placeholder="商品コードを入力" disabled>
                </div>
                <button class="btn btn-primary search-input" id="searchBtn" disabled>検索</button>
                <h5 class="mt-3">検索結果</h5>
                <table class="table" id="queryResultTable">
                    <thead>
                        <tr>
                            <th>問屋コード</th>
                            <th>項目１</th>
                            <th>項目２</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            
            <!-- 逆検索 -->
            <div class="tab-pane fade" id="reverse-query" role="tabpanel" aria-labelledby="reverse-query-tab">
                <h3>逆検索</h3>
                <div class="mb-3">
                    <label for="shouhinCode" class="form-label">問屋コードを入力してください</label>
                    <input type="text" class="form-control search-input" id="shouhinCode" placeholder="問屋コードを入力" disabled>
                </div>
                <button class="btn btn-primary search-input" id="reverseSearchBtn" disabled>逆検索</button>
                <h5 class="mt-3">検索結果</h5>
                <table class="table" id="reverseQueryResultTable">
                    <thead>
                        <tr>
                            <th>商品コード</th>
                            <th>項目１</th>
                            <th>項目２</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            
            <!-- アップロード -->
            <div class="tab-pane fade" id="upload" role="tabpanel" aria-labelledby="upload-tab">
                <h3>変換マスタのアップロード</h3>
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="fileInput" class="form-label">ファイルを選択してください</label>
                        <input type="file" class="form-control" id="fileInput" name="file">
                    </div>
                    <button type="submit" class="btn btn-primary">アップロード</button>
                </form>
                <p class="mt-3 fw-bold text-primary" id="uploadStatus"></p>
            </div>
        </div>
    </div>

   <script>
    // 你的 GAS 網址 (用於上傳檔案與取得時間)
    const GAS_URL = "https://script.google.com/macros/s/AKfycby8jVOs2w2PyBo4Xpplsfr7Bl_0q-vkENbiHDih_iFxH3nY49zpYF2MvDpUSl1AH30M2w/exec";
    
    // 你的 Google Sheet ID (用於前端直接超高速下載 CSV)
    const SPREADSHEET_ID = "1WEGFBu1drYFMvEP0Z0OgZE4rkVs4_UwH4LPo0F0-Dsc"; 
    const BASE_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;

    // 儲存所有資料的變數
    let masterData =[];

    // 1. 網頁載入時自動執行
    window.onload = function() {
        refreshAllData();
    };

    // 手動更新按鈕綁定
    document.getElementById("manualUpdateBtn").addEventListener("click", function() {
        refreshAllData();
    });

    // 取得時間並下載資料的整合函數
    function refreshAllData() {
        setSearchEnabled(false); // 下載前先鎖定搜尋功能
        showAlert("データを同期しています... しばらくお待ちください。", "info");
        document.getElementById("dataVersionText").innerText = "取得中...";

        // 取得最新版本時間
        fetch(`${GAS_URL}?action=get_status`)
        .then(response => response.json())
        .then(data => {
            document.getElementById("dataVersionText").innerText = data.time;
            loadData(); // 時間取得成功後下載 CSV
        })
        .catch(err => {
            document.getElementById("dataVersionText").innerText = "取得失敗";
            showAlert("通信エラー：バージョン情報の取得に失敗しました。手動更新をお試しください。", "danger");
        });
    }

    // 下載 CSV 資料
    function loadData() {
        // 加上時間戳記避免瀏覽器快取 (Cache-busting)
        const noCacheCsvUrl = BASE_CSV_URL + "&cb=" + new Date().getTime();

        Papa.parse(noCacheCsvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true, // 忽略空行
            complete: function(results) {
                // 檢查是否真的有下載到資料
                if (results.data && results.data.length > 0) {
                    masterData = results.data;
                    console.log("資料載入完成，共 " + masterData.length + " 筆");
                    setSearchEnabled(true); // 解鎖搜尋功能
                    showAlert(`最新データの取得に成功しました。（全 ${masterData.length} 件）`, "success");
                    
                    // 3秒後隱藏成功訊息
                    setTimeout(() => hideAlert(), 3000);
                } else {
                    showAlert("エラー：データが空です。管理者に確認するか、再度手動更新をしてください。", "danger");
                }
            },
            error: function(err) {
                console.error("CSV Download Error:", err);
                showAlert("エラー：データのダウンロードに失敗しました。更新ボタンを押して再試行してください。", "danger");
            }
        });
    }

    // 控制搜尋UI是否可用 (鎖定/解鎖)
    function setSearchEnabled(isEnabled) {
        const elements = document.querySelectorAll('.search-input');
        elements.forEach(el => {
            el.disabled = !isEnabled;
        });
    }

    // 顯示系統提示訊息
    function showAlert(message, type) {
        const alertBox = document.getElementById("systemAlert");
        alertBox.className = `alert alert-${type}`;
        alertBox.innerText = message;
        alertBox.style.display = "block";
    }

    // 隱藏系統提示訊息
    function hideAlert() {
        document.getElementById("systemAlert").style.display = "none";
    }

    // 2. 檔案上傳
    document.getElementById("uploadForm").addEventListener("submit", function(event) {
        event.preventDefault();
        const fileInput = document.getElementById("fileInput");
        if(fileInput.files.length === 0) return alert("ファイルを選択してください");

        const statusEl = document.getElementById("uploadStatus");
        statusEl.className = "mt-3 fw-bold text-info";
        statusEl.innerText = 'アップロード中... (上傳中，請稍候)';
        
        // 上傳期間鎖定搜尋
        setSearchEnabled(false);

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result.split(',')[1];
            fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'upload', data: base64Data })
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    statusEl.className = "mt-3 fw-bold text-success";
                    statusEl.innerText = 'アップロード完了！データを更新しています...';
                    fileInput.value = ""; // 清空檔案選擇
                    
                    // 上傳成功後，自動更新所有資料與時間
                    refreshAllData();
                } else {
                    statusEl.className = "mt-3 fw-bold text-danger";
                    statusEl.innerText = 'アップロード失敗: ' + data.message;
                }
            })
            .catch(error => { 
                statusEl.className = "mt-3 fw-bold text-danger";
                statusEl.innerText = '通信エラーによりアップロード失敗'; 
            });
        };
        reader.readAsDataURL(fileInput.files[0]);
    });

    // 3. 瞬間搜尋 (Query)
    document.getElementById("searchBtn").addEventListener("click", function() {
        let itemCode = document.getElementById("itemCode").value.trim();
        if(!itemCode) return;

        let tableBody = document.querySelector("#queryResultTable tbody");
        tableBody.innerHTML = '';
        
        let results = masterData.filter(row => row.Item_Code == itemCode);
        
        if(results.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">該当するデータがありません</td></tr>';
            return;
        }

        results.forEach(row => {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td>${row.Shouhin_Code || ''}</td><td>${row.Color_Name || ''}</td><td>${row.Size_Name || ''}</td>`;
            tableBody.appendChild(tr);
        });
    });

    // 4. 瞬間逆搜尋 (Reverse Query)
    document.getElementById("reverseSearchBtn").addEventListener("click", function() {
        let shouhinCode = document.getElementById("shouhinCode").value.trim();
        if(!shouhinCode) return;

        let tableBody = document.querySelector("#reverseQueryResultTable tbody");
        tableBody.innerHTML = '';
        
        let results = masterData.filter(row => row.Shouhin_Code == shouhinCode);
        
        if(results.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">該当するデータがありません</td></tr>';
            return;
        }

        results.forEach(row => {
            let tr = document.createElement('tr');
            tr.innerHTML = `<td>${row.Item_Code || ''}</td><td>${row.Color_Name || ''}</td><td>${row.Size_Name || ''}</td>`;
            tableBody.appendChild(tr);
        });
    });
</script>

</body>
</html>
