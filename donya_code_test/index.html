<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>変換マスタ管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .container { max-width: 900px; }
        /* 點擊複製的樣式 */
        .copy-cell { 
            cursor: pointer; 
            position: relative; 
            transition: background 0.2s;
            color: #0d6efd;
            font-weight: bold;
            text-decoration: underline;
        }
        .copy-cell:hover { background-color: #e9ecef; }
        .copy-btn { padding: 2px 8px; font-size: 11px; margin-left: 8px; vertical-align: middle; }
        
        #systemAlert { display: none; margin-bottom: 15px; }
        .loading-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; 
        }
        .table thead { background-color: #eee; }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status"></div>
            <div class="mt-2 fw-bold">處理中...</div>
        </div>
    </div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-3">
            <h2 class="h4 mb-0 text-primary">変換マスタ管理</h2>
            <div class="text-end">
                <div class="small text-muted">Version: <span id="verText" class="fw-bold">---</span></div>
                <button class="btn btn-sm btn-outline-primary" id="syncBtn">最新データを同期</button>
            </div>
        </div>

        <div id="systemAlert" class="alert py-2 small"></div>

        <ul class="nav nav-tabs" id="mainTab">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#searchPane">検索</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#reversePane">逆検索</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#uploadPane">アップロード</a></li>
        </ul>
        
        <div class="tab-content mt-3 bg-white p-3 border border-top-0 rounded-bottom shadow-sm">
            <!-- 搜尋 -->
            <div class="tab-pane fade show active" id="searchPane">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="itemIn" placeholder="商品コードを入力してください (Enter可)">
                    <button class="btn btn-primary" id="searchBtn">検索</button>
                </div>
                <table class="table table-hover border" id="resTable">
                    <thead><tr><th>問屋コード (クリックでコピー)</th><th>カラー</th><th>サイズ</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            
            <!-- 逆搜尋 -->
            <div class="tab-pane fade" id="reversePane">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" id="shouhinIn" placeholder="問屋コードを入力してください (Enter可)">
                    <button class="btn btn-primary" id="revSearchBtn">逆検索</button>
                </div>
                <table class="table table-hover border" id="revResTable">
                    <thead><tr><th>商品コード (クリックでコピー)</th><th>カラー</th><th>サイズ</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            
            <!-- 上傳 -->
            <div class="tab-pane fade" id="uploadPane">
                <div class="p-2">
                    <label class="form-label fw-bold">CSVファイルを選択</label>
                    <input type="file" class="form-control mb-3" id="fileIn" accept=".csv">
                    <button id="upBtn" class="btn btn-danger w-100">サーバーへアップロード</button>
                </div>
            </div>
        </div>
    </div>

<script>
    (function() {
        // --- 請將你的新部署 URL 填在下方 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwRygD3n_uBbl3jRkNjkIELFePx9n-97h7IMWa-xMyOXp6PTDOszSPoWZBewVMDWHl56g/exec";
        
        let masterData = [];

        window.onload = () => {
            // 安全檢查：不允許直接開啟本地檔案
            if (window.location.protocol === 'file:') {
                document.body.innerHTML = "<div class='container mt-5'><h3>安全錯誤：請使用伺服器網址訪問，不可直接開啟 HTML 檔案。</h3></div>";
                return;
            }
            loadFromCache();
        };

        function loadFromCache() {
            const cached = localStorage.getItem("MASTER_DATA");
            const time = localStorage.getItem("MASTER_TIME");
            if (cached) {
                masterData = JSON.parse(cached);
                document.getElementById("verText").innerText = new Date(parseInt(time)).toLocaleString();
                showAlert("快取資料載入成功 (筆數: " + masterData.length + ")", "secondary");
            } else {
                syncData();
            }
        }

        async function syncData() {
            showLoading(true);
            try {
                const res = await fetch(`${GAS_URL}?action=get_data`);
                const json = await res.json();
                
                if (json.data && json.data.length > 1) {
                    const rows = json.data.slice(1);
                    masterData = rows.map(r => ({
                        s: String(r[0]||'').trim(), // 問屋 (Shouhin)
                        i: String(r[1]||'').trim(), // 商品 (Item)
                        c: String(r[2]||'').trim(), // Color
                        z: String(r[3]||'').trim()  // Size
                    }));
                    localStorage.setItem("MASTER_DATA", JSON.stringify(masterData));
                    localStorage.setItem("MASTER_TIME", new Date().getTime());
                    location.reload(); // 重新整理以更新顯示
                } else if (json.error) {
                    showAlert("伺服器錯誤: " + json.error, "danger");
                } else {
                    showAlert("伺服器上目前沒有資料，請先執行上傳。", "warning");
                }
            } catch (e) {
                showAlert("無法連接到伺服器，請檢查 GAS 網址與部署權限。", "danger");
            } finally {
                showLoading(false);
            }
        }

        function handleSearch(isRev) {
            const input = document.getElementById(isRev ? "shouhinIn" : "itemIn").value.trim().toLowerCase();
            const tbody = document.querySelector(isRev ? "#revResTable tbody" : "#resTable tbody");
            tbody.innerHTML = "";
            if (!input) return;

            const results = masterData.filter(d => {
                const target = isRev ? d.s : d.i;
                return target.toLowerCase() === input;
            });

            if (results.length === 0) {
                tbody.innerHTML = "<tr><td colspan='3' class='text-center text-muted'>一致するデータがありません</td></tr>";
                return;
            }

            results.forEach(d => {
                const tr = document.createElement("tr");
                const codeToCopy = isRev ? d.i : d.s;
                tr.innerHTML = `
                    <td class="copy-cell" onclick="copyValue('${codeToCopy}', this)">
                        ${codeToCopy}
                        <button class="btn btn-outline-primary btn-xs copy-btn">Copy</button>
                    </td>
                    <td>${d.c}</td>
                    <td>${d.z}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.copyValue = function(val, el) {
            navigator.clipboard.writeText(val).then(() => {
                const originalBg = el.style.backgroundColor;
                el.style.backgroundColor = "#d1e7dd";
                setTimeout(() => el.style.backgroundColor = originalBg, 400);
            });
        };

        // 綁定事件
        document.getElementById("searchBtn").onclick = () => handleSearch(false);
        document.getElementById("revSearchBtn").onclick = () => handleSearch(true);
        document.getElementById("syncBtn").onclick = () => syncData();
        document.getElementById("itemIn").onkeypress = (e) => { if(e.key==='Enter') handleSearch(false) };
        document.getElementById("shouhinIn").onkeypress = (e) => { if(e.key==='Enter') handleSearch(true) };

        // 上傳功能
        document.getElementById("upBtn").onclick = async () => {
            const file = document.getElementById("fileIn").files[0];
            if (!file) return alert("請選擇 CSV 檔案");
            showLoading(true);
            const reader = new FileReader();
            reader.onload = async (e) => {
                const b64 = e.target.result.split(',')[1];
                try {
                    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'upload', data: b64 }) });
                    const resJson = await res.json();
                    if(resJson.status === 'success') {
                        alert("上傳成功！系統將自動重新同步。");
                        syncData();
                    } else { alert("上傳失敗: " + resJson.message); }
                } catch (err) { alert("連線錯誤"); }
                finally { showLoading(false); }
            };
            reader.readAsDataURL(file);
        };

        function showAlert(m, type) {
            const a = document.getElementById("systemAlert");
            a.className = `alert alert-${type} py-2 small`;
            a.innerText = m;
            a.style.display = "block";
        }
        function showLoading(s) { document.getElementById("loadingOverlay").style.display = s ? "flex" : "none"; }
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
