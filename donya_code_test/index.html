<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轉換主檔管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; } /* 已移除 user-select: none */
        .copyable { cursor: pointer; color: #0d6efd; text-decoration: underline; transition: 0.2s; }
        .copyable:hover { color: #0a58ca; background-color: #e9ecef; }
        .copy-btn { padding: 2px 6px; font-size: 0.75rem; margin-left: 5px; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 9999; justify-content: center; align-items: center; }
        #systemAlert { display: none; }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-end mb-3 border-bottom pb-2">
            <h1 class="h4 mb-0">轉換主檔管理系統</h1>
            <div class="text-end">
                <div class="small text-muted">最後更新: <span id="dataVersionText">---</span></div>
                <button class="btn btn-sm btn-outline-primary mt-1" id="manualUpdateBtn">手動同步資料</button>
            </div>
        </div>

        <div id="systemAlert" class="alert small py-2"></div>

        <!-- 頁籤 -->
        <ul class="nav nav-tabs" id="myTab">
            <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#query">検索</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#reverse-query">逆検索</a></li>
            <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#upload">系統管理</a></li>
        </ul>
        
        <div class="tab-content mt-3">
            <!-- 搜尋 -->
            <div class="tab-pane fade show active" id="query">
                <div class="input-group mb-3">
                    <input type="text" class="form-control search-input" id="itemCode" placeholder="輸入商品代碼...">
                    <button class="btn btn-primary" id="searchBtn">検索</button>
                </div>
                <table class="table table-bordered table-sm" id="queryResultTable">
                    <thead class="table-light"><tr><th>問屋コード (點擊複製)</th><th>項目１</th><th>項目２</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            
            <!-- 逆搜尋 -->
            <div class="tab-pane fade" id="reverse-query">
                <div class="input-group mb-3">
                    <input type="text" class="form-control search-input" id="shouhinCode" placeholder="輸入問屋代碼...">
                    <button class="btn btn-primary" id="reverseSearchBtn">逆検索</button>
                </div>
                <table class="table table-bordered table-sm" id="reverseQueryResultTable">
                    <thead class="table-light"><tr><th>商品コード (點擊複製)</th><th>項目１</th><th>項目２</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
            
            <!-- 上傳 -->
            <div class="tab-pane fade" id="upload">
                <div class="card card-body">
                    <h6>上傳最新 CSV 檔案</h6>
                    <input type="file" class="form-control mb-2" id="fileInput" accept=".csv">
                    <button id="uploadBtn" class="btn btn-danger btn-sm">上傳並覆蓋現有資料</button>
                </div>
            </div>
        </div>
    </div>

<script>
    (function() {
        // --- 設定區 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxnYvUsep_wz4A0uf3V3NWkR1NS_xkFmfxjAr0q6rRl8IMe1SNafAiE2KkwHCgj99AFkQ/exec"; // <--- 請務必貼上正確網址
        const CACHE_KEY = "MASTER_DATA_CACHE";
        const CACHE_TIME_KEY = "MASTER_DATA_TIME";
        
        let masterData = [];

        window.onload = () => init();

        async function init() {
            // 檢查是否本地開啟 (保留保護，但允許複製內容)
            if (window.location.protocol === 'file:') {
                alert("安全錯誤：請透過網址訪問，不可直接開啟 HTML 檔案。");
                return;
            }

            const cachedData = localStorage.getItem(CACHE_KEY);
            if (cachedData) {
                masterData = JSON.parse(cachedData);
                updateVersionDisplay();
                showAlert("快取資料載入完成", "secondary");
            } else {
                refreshAllData();
            }
        }

        async function refreshAllData() {
            showLoading(true);
            try {
                const res = await fetch(`${GAS_URL}?action=get_data`);
                const result = await res.json();
                
                if (result.error) {
                    showAlert("錯誤: " + result.error, "danger");
                    return;
                }

                if (result.data && result.data.length > 1) {
                    const rows = result.data.slice(1);
                    masterData = rows.map(row => ({
                        shouhin: String(row[0] || "").trim(), // A欄
                        item:    String(row[1] || "").trim(), // B欄
                        color:   String(row[2] || "").trim(), // C欄
                        size:    String(row[3] || "").trim()  // D欄
                    }));

                    localStorage.setItem(CACHE_KEY, JSON.stringify(masterData));
                    localStorage.setItem(CACHE_TIME_KEY, new Date().getTime());
                    showAlert("資料同步成功！共 " + masterData.length + " 筆", "success");
                    updateVersionDisplay();
                } else {
                    showAlert("伺服器資料是空的，請先上傳 CSV", "warning");
                }
            } catch (err) {
                showAlert("無法連線至 GAS，請檢查網址或權限", "danger");
            } finally {
                showLoading(false);
            }
        }

        // 搜尋功能
        function doSearch(isReverse) {
            const inputId = isReverse ? 'shouhinCode' : 'itemCode';
            const tableId = isReverse ? 'reverseQueryResultTable' : 'queryResultTable';
            const val = document.getElementById(inputId).value.trim().toLowerCase();
            if (!val) return;

            const tbody = document.querySelector(`#${tableId} tbody`);
            tbody.innerHTML = '';

            const results = masterData.filter(d => {
                const target = isReverse ? d.shouhin : d.item;
                return target.toLowerCase() === val;
            });

            if (results.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center">無符合資料</td></tr>';
                return;
            }

            results.forEach(d => {
                const tr = document.createElement('tr');
                const code = isReverse ? d.item : d.shouhin;
                
                tr.innerHTML = `
                    <td class="copyable" onclick="copyText('${code}', this)">
                        ${code}
                        <button class="btn btn-outline-secondary btn-xs copy-btn" onclick="event.stopPropagation(); copyText('${code}', this.parentElement)">複製</button>
                    </td>
                    <td>${d.color}</td>
                    <td>${d.size}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 複製功能
        window.copyText = function(text, el) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = el.innerHTML;
                el.style.backgroundColor = "#d1e7dd";
                setTimeout(() => { el.style.backgroundColor = ""; }, 500);
            });
        };

        // 按鈕綁定
        document.getElementById("searchBtn").onclick = () => doSearch(false);
        document.getElementById("reverseSearchBtn").onclick = () => doSearch(true);
        document.getElementById("manualUpdateBtn").onclick = () => refreshAllData();
        
        // Enter 鍵支援
        document.querySelectorAll('.search-input').forEach(input => {
            input.onkeypress = (e) => { if(e.key === 'Enter') doSearch(input.id === 'shouhinCode') };
        });

        // 上傳功能
        document.getElementById("uploadBtn").onclick = async () => {
            const file = document.getElementById("fileInput").files[0];
            if (!file) return alert("請選擇檔案");

            showLoading(true);
            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result.split(',')[1];
                try {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'upload', data: base64Data })
                    });
                    const json = await res.json();
                    if(json.status === 'success') {
                        alert("上傳成功！");
                        refreshAllData();
                    }
                } catch (err) { alert("上傳失敗"); }
                finally { showLoading(false); }
            };
            reader.readAsDataURL(file);
        };

        function showAlert(msg, type) {
            const el = document.getElementById("systemAlert");
            el.className = `alert alert-${type} small py-2`;
            el.innerText = msg;
            el.style.display = "block";
        }

        function showLoading(show) {
            document.getElementById("loadingOverlay").style.display = show ? "flex" : "none";
        }

        function updateVersionDisplay() {
            const time = localStorage.getItem(CACHE_TIME_KEY);
            if(time) document.getElementById("dataVersionText").innerText = new Date(parseInt(time)).toLocaleString();
        }
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
