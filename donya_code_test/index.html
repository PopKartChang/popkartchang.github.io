<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品コード 変換システム</title>
    <!-- 使用較大的字體設定 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent-color: #224abe; --bg-color: #ffffff; --copy-btn-color: #198754; }
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f0f2f5; 
            color: #212529; 
            margin: 0;
            font-size: 1.2rem; /* 整體字體加大 */
            user-select: auto !important;
        }
        
        /* 標頭：更醒目 */
        .main-header {
            background: #224abe;
            color: white; padding: 2rem 0; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .status-panel {
            background: rgba(0,0,0,0.2); border-radius: 10px;
            padding: 15px; font-size: 1rem; line-height: 1.6;
        }
        
        /* 卡片設計 */
        .content-card {
            background: white; border-radius: 20px; border: 2px solid #dee2e6;
            padding: 2rem; margin-bottom: 2rem;
        }

        /* 選單：大按鈕化 */
        .nav-pills .nav-link { 
            font-size: 1.3rem; font-weight: bold; padding: 15px;
            border: 2px solid #dee2e6; margin-bottom: 10px; border-radius: 12px;
            background: white; color: #444;
        }
        .nav-pills .nav-link.active { background-color: #224abe; color: white; border-color: #224abe; }

        /* 輸入框：特大號 */
        .form-control { 
            font-size: 1.5rem; border-radius: 12px; border: 3px solid #ced4da; padding: 1rem;
            user-select: text !important;
        }
        .form-control:focus { border-color: #224abe; box-shadow: 0 0 0 0.3rem rgba(34,74,190,0.2); }

        /* 搜尋按鈕：特大號 */
        .btn-search { font-size: 1.5rem; font-weight: bold; padding: 1rem 2rem; border-radius: 12px; }

        /* 表格優化 */
        .table { font-size: 1.3rem; border-collapse: separate; border-spacing: 0 10px; }
        .table thead th { border: none; color: #666; font-size: 1.1rem; }
        .table tbody tr { background: #f8f9fa; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .table td { padding: 20px !important; border: none; vertical-align: middle; }
        .table td:first-child { border-radius: 12px 0 0 12px; }
        .table td:last-child { border-radius: 0 12px 12px 0; }

        /* 複製按鈕：老人家最需要的明確按鈕 */
        .btn-copy-main {
            font-size: 1.1rem; font-weight: bold; padding: 10px 20px;
            border-radius: 10px; background-color: var(--copy-btn-color); color: white;
            border: none; cursor: pointer; transition: 0.2s; width: 100%;
        }
        .btn-copy-main:active { transform: scale(0.95); }
        
        .code-text {
            color: #224abe; font-weight: bold; cursor: pointer; text-decoration: underline;
            display: block; margin-bottom: 5px; font-size: 1.5rem;
        }
        
        /* 載入畫面 */
        .sync-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .sync-overlay h2 { font-size: 2rem; color: #224abe; margin-top: 20px; }
    </style>
</head>
<body>

<div class="sync-overlay" id="syncOverlay">
    <div class="spinner-border text-primary" style="width: 5rem; height: 5rem; border-width: .5em;"></div>
    <h2>データを更新しています...</h2>
    <p>そのまま 10秒ほど お待ちください</p>
</div>

<header class="main-header mb-4 text-center">
    <div class="container">
        <h1 class="fw-bold mb-2" style="font-size: 2.5rem;">商品コード 変換システム</h1>
        <div class="d-flex justify-content-center">
            <div class="status-panel text-start">
                <div>● データの同期：<span id="txtLocalTime">---</span></div>
                <div>● 本部の更新：<span id="txtServerTime">---</span></div>
                <div>● 次回の更新まで：<span id="txtExpiry" class="fw-bold text-warning">---</span></div>
            </div>
        </div>
    </div>
</header>

<div class="container pb-5">
    <div class="row">
        <!-- 功能選單 -->
        <div class="col-lg-3">
            <div class="nav flex-column nav-pills" role="tablist">
                <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#paneSearch">🔍 商品コードで探す</button>
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#paneRevSearch">🔍 問屋コードで探す</button>
                <button class="nav-link" data-bs-toggle="pill" data-bs-target="#paneUpload" onclick="checkServerUpdate()">⚙ データの管理</button>
                <button class="btn btn-dark btn-lg mt-4 py-3 fw-bold" id="btnManualSync">🔄 今すぐ最新にする</button>
            </div>
        </div>

        <!-- 內容區 -->
        <div class="col-lg-9">
            <div class="tab-content">
                <!-- 商品搜尋 -->
                <div class="tab-pane fade show active" id="paneSearch">
                    <div class="content-card">
                        <h3 class="fw-bold mb-4">商品コードを入力してください</h3>
                        <div class="mb-4">
                            <input type="text" class="form-control mb-3" id="inItemCode" placeholder="例: ITEM123" inputmode="text">
                            <button class="btn btn-primary w-100 btn-search" id="btnExecSearch">この番号で検索する</button>
                        </div>
                        <hr>
                        <table class="table" id="resTable">
                            <thead><tr><th style="width: 50%;">変換後の番号</th><th>カラー / サイズ</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <!-- 逆搜尋 -->
                <div class="tab-pane fade" id="paneRevSearch">
                    <div class="content-card">
                        <h3 class="fw-bold mb-4">問屋コードを入力してください</h3>
                        <div class="mb-4">
                            <input type="text" class="form-control mb-3" id="inShouhinCode" placeholder="例: TOI456" inputmode="text">
                            <button class="btn btn-primary w-100 btn-search" id="btnExecRevSearch">この番号で検索する</button>
                        </div>
                        <hr>
                        <table class="table" id="revResTable">
                            <thead><tr><th style="width: 50%;">変換後の番号</th><th>カラー / サイズ</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <!-- 上傳 -->
                <div class="tab-pane fade" id="paneUpload">
                    <div class="content-card">
                        <h3 class="fw-bold mb-4">マスタデータの更新</h3>
                        <div class="p-4 mb-4 bg-light rounded-4 border">
                            <p class="mb-1">本部から受け取ったCSVファイルを選択してください。</p>
                            <p class="fw-bold text-danger">本部側の最終更新：<span id="txtServerStatus">---</span></p>
                        </div>
                        <input type="file" id="filePicker" class="form-control mb-4" accept=".csv">
                        <button class="btn btn-danger btn-lg w-100 py-3 fw-bold" id="btnUpload">新しいデータに書き換える</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwce3KuVDjreoFrFXC3kP3AbqkuV-RgmWjQSSsiweD689KdnOuGeqxFkF5M3HfOG7eR/exec";
    const EXPIRE_MIN = 240; 
    
    let masterData = [];
    let timer = null;

    window.onload = () => {
        if (window.location.protocol === 'file:') {
            alert("エラー: サーバーを通してアクセスしてください。");
            return;
        }
        init();
    };

    async function init() {
        const cached = localStorage.getItem("APP_DATA");
        const lastSync = localStorage.getItem("LAST_SYNC_TS");

        if (cached && lastSync) {
            const now = new Date().getTime();
            const elapsed = (now - parseInt(lastSync)) / 60000;
            if (elapsed > EXPIRE_MIN) {
                await syncData();
            } else {
                masterData = JSON.parse(cached);
                refreshUI();
                startCountdown(parseInt(lastSync));
            }
        } else {
            await syncData();
        }
    }

    async function syncData() {
        toggleOverlay(true);
        try {
            const res = await fetch(`${GAS_URL}?action=get_data`);
            const json = await res.json();
            if (json.data) {
                const rows = json.data.slice(1);
                const processed = rows.map(r => ({ s: String(r[0]||''), i: String(r[1]||''), c: String(r[2]||''), z: String(r[3]||'') }));
                localStorage.setItem("APP_DATA", JSON.stringify(processed));
                localStorage.setItem("LAST_SYNC_TS", new Date().getTime());
                localStorage.setItem("SERVER_TS", json.serverTime || '---');
                location.reload();
            }
        } catch (e) {
            alert("通信エラー：インターネットを確認してください");
            toggleOverlay(false);
        }
    }

    window.checkServerUpdate = async function() {
        try {
            const res = await fetch(`${GAS_URL}?action=get_status`);
            const json = await res.json();
            document.getElementById("txtServerStatus").innerText = json.serverTime;
            document.getElementById("txtServerTime").innerText = json.serverTime;
        } catch (e) {}
    };

    function search(isRev) {
        const inputId = isRev ? "inShouhinCode" : "inItemCode";
        const tableId = isRev ? "revResTable" : "resTable";
        const query = document.getElementById(inputId).value.trim().toLowerCase();
        const tbody = document.querySelector(`#${tableId} tbody`);
        
        tbody.innerHTML = "";
        if(!query) return;

        const results = masterData.filter(d => (isRev ? d.s : d.i).toLowerCase() === query);
        if(results.length === 0) {
            tbody.innerHTML = '<tr><td colspan="2" class="text-center py-5 text-muted">該当なし。番号が正しいか確認してください。</td></tr>';
            return;
        }

        results.forEach(d => {
            const tr = document.createElement("tr");
            const val = isRev ? d.i : d.s;
            tr.innerHTML = `
                <td>
                    <span class="code-text" onclick="copy('${val}', this)">${val}</span>
                    <button class="btn-copy-main" onclick="copy('${val}', this)">
                        この番号をコピーする
                    </button>
                </td>
                <td>
                    <div class="fw-bold">${d.c}</div>
                    <div class="text-muted small">${d.z}</div>
                </td>`;
            tbody.appendChild(tr);
        });
    }

    window.copy = (txt, btn) => {
        navigator.clipboard.writeText(txt).then(() => {
            const oldText = btn.innerText;
            if(btn.tagName === "BUTTON") {
                btn.innerText = "✅ コピー完了！";
                btn.style.backgroundColor = "#000";
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.style.backgroundColor = "";
                }, 2000);
            } else {
                alert("コピーしました: " + txt);
            }
        });
    };

    document.getElementById("btnUpload").onclick = async () => {
        const file = document.getElementById("filePicker").files[0];
        if (!file) return alert("ファイルを選んでください");
        if (!confirm("データを書き換えてもよろしいですか？")) return;

        toggleOverlay(true);
        const reader = new FileReader();
        reader.onload = async (e) => {
            const b64 = e.target.result.split(',')[1];
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'upload', data: b64 }) });
                const resJson = await res.json();
                if(resJson.status === 'success') {
                    alert("更新に成功しました！");
                    await syncData();
                }
            } catch (err) { alert("更新に失敗しました"); toggleOverlay(false); }
        };
        reader.readAsDataURL(file);
    };

    function startCountdown(syncTs) {
        if(timer) clearInterval(timer);
        timer = setInterval(() => {
            const now = new Date().getTime();
            const remainMs = (EXPIRE_MIN * 60000) - (now - syncTs);
            const el = document.getElementById("txtExpiry");
            if (remainMs <= 0) {
                el.innerText = "更新の時間です";
                syncData();
            } else {
                const m = Math.floor(remainMs / 60000);
                el.innerText = `あと ${m} 分`;
            }
        }, 1000);
    }

    function refreshUI() {
        const local = localStorage.getItem("LAST_SYNC_TS");
        const server = localStorage.getItem("SERVER_TS");
        if(local) document.getElementById("txtLocalTime").innerText = new Date(parseInt(local)).toLocaleString();
        if(server) document.getElementById("txtServerTime").innerText = server;
    }

    function toggleOverlay(show) {
        document.getElementById("syncOverlay").style.display = show ? "flex" : "none";
    }

    // 事件綁定
    document.getElementById("btnExecSearch").addEventListener('click', () => search(false));
    document.getElementById("btnExecRevSearch").addEventListener('click', () => search(true));
    document.getElementById("btnManualSync").addEventListener('click', () => syncData());
    
    // 解決鍵盤問題
    const inputHandler = (isRev) => (e) => {
        if (e.key === 'Enter') search(isRev);
    };
    document.getElementById("inItemCode").addEventListener('keydown', inputHandler(false));
    document.getElementById("inShouhinCode").addEventListener('keydown', inputHandler(true));
    
    // 自動選取輸入內容（方便老人家更換輸入）
    document.querySelectorAll('.form-control').forEach(el => {
        el.addEventListener('focus', () => el.select());
    });

})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
