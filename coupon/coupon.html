<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クーポン管理システム</title>
<style>
:root {
  --bg: #f8f7f4;
  --surface: #ffffff;
  --border: #e2e0db;
  --border-strong: #c8c5be;
  --text: #1a1916;
  --text-muted: #6b6860;
  --text-faint: #a09e9a;
  --accent: #1a5c3a;
  --accent-light: #e8f2ec;
  --accent-hover: #134a2e;
  --yahoo: #ff0033;
  --yahoo-light: #fff0f2;
  --rakuten: #bf0000;
  --rakuten-light: #fff0f0;
  --shopify: #008060;
  --shopify-light: #e6f5f0;
  --tag-bg: #f0ede8;
  --tag-text: #4a4844;
  --danger: #cc3333;
  --danger-light: #fff0f0;
  --warn: #b85c00;
  --warn-light: #fff8ee;
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); min-height: 100vh; }

/* LAYOUT */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
.header .sep { color: var(--border-strong); }
.header .subtitle { font-size: 13px; color: var(--text-muted); }
.header .spacer { flex: 1; }

.tabs { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; gap: 0; }
.tab { padding: 12px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-muted); transition: all 0.15s; white-space: nowrap; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

.main { max-width: 1280px; margin: 0 auto; padding: 24px; }

/* STATS BAR */
.stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; }
.stat .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.stat .value { font-size: 20px; font-weight: 600; margin-top: 2px; }

/* TOOLBAR */
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input { width: 100%; padding: 8px 12px 8px 32px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--surface); color: var(--text); outline: none; }
.search-box input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-faint); font-size: 13px; pointer-events: none; }
select { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--surface); color: var(--text); cursor: pointer; outline: none; }
select:focus { border-color: var(--accent); }
button { padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); transition: all 0.15s; }
button:hover { background: var(--bg); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger { background: var(--danger-light); color: var(--danger); border-color: #f0c0c0; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* TABLE */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.table-info { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 10px 14px; text-align: left; background: #faf9f7; border-bottom: 1px solid var(--border); font-weight: 500; font-size: 12px; color: var(--text-muted); white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { color: var(--text); }
th .sort-icon { opacity: 0.4; }
th.sorted .sort-icon { opacity: 1; color: var(--accent); }
td { padding: 9px 14px; border-bottom: 1px solid #f0ede8; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #faf9f7; }
.code { font-family: 'Menlo', 'Consolas', monospace; font-size: 12px; color: #2a5c8a; }
.price { font-variant-numeric: tabular-nums; }
.discount-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; background: var(--accent-light); color: var(--accent); }
.actions { display: flex; gap: 6px; }
.empty { padding: 48px; text-align: center; color: var(--text-muted); }

/* PAGINATION */
.pagination { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); justify-content: flex-end; font-size: 13px; }
.page-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: var(--surface); font-size: 12px; }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.page-btn:hover:not(.active) { background: var(--bg); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 10px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); padding: 4px 8px; }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
.form-input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; color: var(--text); background: var(--surface); outline: none; font-family: inherit; }
.form-input:focus { border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* GENERATE PANEL */
.generate-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
.generate-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
.gen-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 16px; }
.gen-group { display: flex; flex-direction: column; gap: 4px; }
.gen-group label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.gen-group input, .gen-group select { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--surface); color: var(--text); outline: none; }
.gen-group input:focus, .gen-group select:focus { border-color: var(--accent); }
.output-section { margin-top: 16px; }
.platform-outputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-top: 12px; }
.platform-box { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.platform-header { padding: 8px 12px; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
.platform-header.yahoo { background: var(--yahoo-light); color: var(--yahoo); }
.platform-header.rakuten { background: var(--rakuten-light); color: var(--rakuten); }
.platform-header.shopify { background: var(--shopify-light); color: var(--shopify); }
.platform-content { padding: 10px 12px; font-size: 12px; font-family: monospace; line-height: 1.6; background: #fafaf9; min-height: 80px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; color: var(--text); }
.copy-btn { padding: 2px 8px; font-size: 11px; cursor: pointer; border: 1px solid currentColor; border-radius: 4px; background: transparent; opacity: 0.8; }
.copy-btn:hover { opacity: 1; }

/* DISCOUNT GROUP FILTER */
.discount-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.discount-chip { padding: 4px 10px; border-radius: 14px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); transition: all 0.12s; }
.discount-chip:hover { border-color: var(--accent); color: var(--accent); }
.discount-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.discount-chip.all { font-weight: 500; }

/* NOTICE */
.notice { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
.notice.info { background: var(--accent-light); color: var(--accent); border-left: 3px solid var(--accent); }
.notice.warn { background: var(--warn-light); color: var(--warn); border-left: 3px solid var(--warn); }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; background: #1a1916; color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 13px; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.2s; }
.toast.show { transform: translateY(0); opacity: 1; }

/* COUPON RECORD HISTORY */
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-item { border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; }
.history-item .hist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.history-item .period { font-size: 13px; font-weight: 500; }
.history-item .hist-meta { font-size: 11px; color: var(--text-muted); }
.platform-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; margin-right: 4px; }
.platform-tag.yahoo { background: var(--yahoo-light); color: var(--yahoo); }
.platform-tag.rakuten { background: var(--rakuten-light); color: var(--rakuten); }
.platform-tag.shopify { background: var(--shopify-light); color: var(--shopify); }
.status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
.status-dot.active { background: #2ea866; }
.status-dot.expired { background: var(--border-strong); }
.status-dot.upcoming { background: #e09000; }
</style>
</head>
<body>

<div class="header">
  <h1>クーポン管理</h1>
  <span class="sep">|</span>
  <span class="subtitle">Yahoo! Shopping / 楽天市場 / Shopify</span>
  <div class="spacer"></div>
  <button class="btn-primary" onclick="openAddModal()">+ 商品追加</button>
</div>

<div class="tabs">
  <div class="tab active" data-tab="products" onclick="switchTab('products')">商品一覧</div>
  <div class="tab" data-tab="generate" onclick="switchTab('generate')">クーポン生成</div>
  <div class="tab" data-tab="history" onclick="switchTab('history')">発行履歴</div>
</div>

<div class="main">

<!-- PRODUCTS TAB -->
<div id="tab-products">
  <div class="stats">
    <div class="stat"><div class="label">商品数</div><div class="value" id="stat-total">—</div></div>
    <div class="stat"><div class="label">割引グループ</div><div class="value" id="stat-groups">—</div></div>
    <div class="stat"><div class="label">最高割引額</div><div class="value" id="stat-max">—</div></div>
    <div class="stat"><div class="label">フィルタ中</div><div class="value" id="stat-filtered">—</div></div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="商品番号を検索..." oninput="applyFilters()">
    </div>
    <select id="discount-filter" onchange="applyFilters()">
      <option value="">すべての割引額</option>
    </select>
    <select id="sort-field" onchange="applyFilters()">
      <option value="id">番号順</option>
      <option value="discount">割引額順</option>
      <option value="price">価格順</option>
    </select>
    <select id="sort-dir" onchange="applyFilters()">
      <option value="asc">昇順</option>
      <option value="desc">降順</option>
    </select>
    <button onclick="exportCSV()">CSVエクスポート</button>
  </div>

  <div class="table-wrap">
    <div class="table-info">
      <span id="table-count">読み込み中...</span>
      <span id="page-info"></span>
    </div>
    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('id')">商品番号 <span class="sort-icon">↕</span></th>
          <th onclick="toggleSort('price')">販売価格 <span class="sort-icon">↕</span></th>
          <th onclick="toggleSort('discount')">割引額 <span class="sort-icon">↕</span></th>
          <th>割引率</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- GENERATE TAB -->
<div id="tab-generate" style="display:none">
  <div class="generate-panel">
    <h3>クーポン生成</h3>
    <div class="notice info">発行期間と割引額を選択すると、各プラットフォーム用のフォーマットで商品番号を生成します。</div>
    <div class="gen-row">
      <div class="gen-group">
        <label>発行開始日</label>
        <input type="date" id="gen-start">
      </div>
      <div class="gen-group">
        <label>発行終了日</label>
        <input type="date" id="gen-end">
      </div>
      <div class="gen-group">
        <label>割引額</label>
        <select id="gen-discount" onchange="generateCoupons()">
          <option value="">選択してください</option>
        </select>
      </div>
      <div class="gen-group">
        <label>検索フィルタ</label>
        <input type="text" id="gen-search" placeholder="番号で絞り込み..." oninput="generateCoupons()">
      </div>
      <button class="btn-primary" onclick="generateCoupons()">生成</button>
    </div>

    <div id="gen-summary" style="display:none" class="notice info"></div>

    <div id="gen-output" style="display:none">
      <div class="platform-outputs">
        <div class="platform-box">
          <div class="platform-header yahoo">
            <span>Yahoo! Shopping</span>
            <button class="copy-btn" onclick="copyPlatform('yahoo')">コピー</button>
          </div>
          <div class="platform-content" id="yahoo-output"></div>
        </div>
        <div class="platform-box">
          <div class="platform-header rakuten">
            <span>楽天市場</span>
            <button class="copy-btn" onclick="copyPlatform('rakuten')">コピー</button>
          </div>
          <div class="platform-content" id="rakuten-output"></div>
        </div>
        <div class="platform-box">
          <div class="platform-header shopify">
            <span>Shopify</span>
            <button class="copy-btn" onclick="copyPlatform('shopify')">コピー</button>
          </div>
          <div class="platform-content" id="shopify-output"></div>
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
        <button class="btn-primary" onclick="saveToHistory()">発行履歴に保存</button>
        <span style="font-size:12px;color:var(--text-muted)">保存すると履歴タブで確認できます</span>
      </div>
    </div>
  </div>
</div>

<!-- HISTORY TAB -->
<div id="tab-history" style="display:none">
  <div class="toolbar" style="margin-bottom:16px">
    <h3 style="font-size:14px;font-weight:600;flex:1">発行履歴</h3>
    <button class="btn-danger btn-sm" onclick="clearHistory()">履歴を全削除</button>
  </div>
  <div id="history-content"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">商品追加</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-original-id">
      <div class="form-group">
        <label class="form-label">商品番号</label>
        <input type="text" class="form-input" id="form-id" placeholder="例: cra-avis-bri">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">販売価格 (円)</label>
          <input type="number" class="form-input" id="form-price" placeholder="例: 66000">
        </div>
        <div class="form-group">
          <label class="form-label">割引額 (円)</label>
          <input type="number" class="form-input" id="form-discount" placeholder="例: 6600">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" onclick="saveProduct()">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// Load from localStorage or use seed
function loadProducts() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return JSON.parse(stored);
  } catch(e) {}
  return JSON.parse(JSON.stringify(SEED_DATA));
}
function saveProducts(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
}
function saveHistory(data) {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(data)); } catch(e) {}
}

let products = loadProducts();
let filtered = [...products];
let currentPage = 1;
const PAGE_SIZE = 50;
let sortField = 'id', sortDir = 'asc';
let editingId = null;
let lastGenerated = null;

// ── INIT ──────────────────────────────────────────────────────────────────
function init() {
  // Set default dates
  const today = new Date();
  const y = today.getFullYear(), m = String(today.getMonth()+1).padStart(2,'0'), d = String(today.getDate()).padStart(2,'0');
  document.getElementById('gen-start').value = `${y}-${m}-01`;
  const lastDay = new Date(y, today.getMonth()+1, 0).getDate();
  document.getElementById('gen-end').value = `${y}-${m}-${lastDay}`;

  populateDiscountFilter();
  populateGenDiscount();
  applyFilters();
  updateStats();
}

function getDiscounts() {
  return [...new Set(products.map(p => p.discount))].sort((a,b) => a-b);
}

function populateDiscountFilter() {
  const sel = document.getElementById('discount-filter');
  sel.innerHTML = '<option value="">すべての割引額</option>';
  getDiscounts().forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = `¥${d.toLocaleString()}`;
    sel.appendChild(o);
  });
}

function populateGenDiscount() {
  const sel = document.getElementById('gen-discount');
  sel.innerHTML = '<option value="">選択してください</option>';
  getDiscounts().forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = `¥${d.toLocaleString()} (${products.filter(p=>p.discount===d).length}件)`;
    sel.appendChild(o);
  });
}

function updateStats() {
  const discounts = getDiscounts();
  document.getElementById('stat-total').textContent = products.length.toLocaleString();
  document.getElementById('stat-groups').textContent = discounts.length;
  document.getElementById('stat-max').textContent = discounts.length ? `¥${Math.max(...discounts).toLocaleString()}` : '—';
  document.getElementById('stat-filtered').textContent = filtered.length.toLocaleString();
}

// ── FILTERS & TABLE ───────────────────────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const disc = document.getElementById('discount-filter').value;
  sortField = document.getElementById('sort-field').value;
  sortDir = document.getElementById('sort-dir').value;

  filtered = products.filter(p => {
    if (q && !p.id.toLowerCase().includes(q)) return false;
    if (disc && p.discount !== +disc) return false;
    return true;
  });

  filtered.sort((a,b) => {
    let va = a[sortField], vb = b[sortField];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  currentPage = 1;
  renderTable();
  updateStats();
}

function toggleSort(field) {
  if (sortField === field) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortField = field;
    sortDir = 'asc';
  }
  document.getElementById('sort-field').value = sortField;
  document.getElementById('sort-dir').value = sortDir;
  applyFilters();
}

function renderTable() {
  const total = filtered.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage-1)*PAGE_SIZE;
  const page = filtered.slice(start, start+PAGE_SIZE);

  document.getElementById('table-count').textContent = `${total.toLocaleString()} 件`;

  const tbody = document.getElementById('table-body');
  if (page.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">該当する商品がありません</td></tr>';
  } else {
    tbody.innerHTML = page.map(p => {
      const rate = (p.discount / p.price * 100).toFixed(1);
      return `<tr>
        <td><span class="code">${esc(p.id)}</span></td>
        <td class="price">¥${p.price.toLocaleString()}</td>
        <td><span class="discount-badge">¥${p.discount.toLocaleString()}</span></td>
        <td class="price" style="color:var(--text-muted)">${rate}%</td>
        <td><div class="actions">
          <button class="btn-sm" onclick="openEditModal('${esc(p.id)}')">編集</button>
          <button class="btn-sm btn-danger" onclick="deleteProduct('${esc(p.id)}')">削除</button>
        </div></td>
      </tr>`;
    }).join('');
  }

  // Pagination
  const pag = document.getElementById('pagination');
  if (pages <= 1) { pag.innerHTML = ''; return; }
  let html = `<span style="color:var(--text-muted);font-size:12px">${start+1}–${Math.min(start+PAGE_SIZE,total)} / ${total}</span>`;
  const range = [];
  for (let i = Math.max(1,currentPage-2); i <= Math.min(pages,currentPage+2); i++) range.push(i);
  if (range[0] > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>`;
  if (range[0] > 2) html += `<span style="color:var(--text-muted)">…</span>`;
  range.forEach(p => { html += `<button class="page-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`; });
  if (range[range.length-1] < pages-1) html += `<span style="color:var(--text-muted)">…</span>`;
  if (range[range.length-1] < pages) html += `<button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  pag.innerHTML = html;
}

function goPage(p) { currentPage = p; renderTable(); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── MODAL ─────────────────────────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '商品追加';
  document.getElementById('form-id').value = '';
  document.getElementById('form-price').value = '';
  document.getElementById('form-discount').value = '';
  document.getElementById('form-id').disabled = false;
  document.getElementById('edit-original-id').value = '';
  document.getElementById('modal').classList.add('open');
}
function openEditModal(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modal-title').textContent = '商品編集';
  document.getElementById('edit-original-id').value = id;
  document.getElementById('form-id').value = p.id;
  document.getElementById('form-price').value = p.price;
  document.getElementById('form-discount').value = p.discount;
  document.getElementById('form-id').disabled = false;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveProduct() {
  const id = document.getElementById('form-id').value.trim();
  const price = parseInt(document.getElementById('form-price').value);
  const discount = parseInt(document.getElementById('form-discount').value);
  if (!id || isNaN(price) || isNaN(discount)) { showToast('必須項目を入力してください'); return; }
  if (price <= 0 || discount <= 0) { showToast('価格・割引額は正の数を入力してください'); return; }
  if (discount >= price) { showToast('割引額は販売価格より小さい必要があります'); return; }

  const origId = document.getElementById('edit-original-id').value;
  if (origId) {
    const idx = products.findIndex(p => p.id === origId);
    if (idx !== -1) products[idx] = {id, price, discount};
  } else {
    if (products.find(p => p.id === id)) { showToast('その商品番号は既に存在します'); return; }
    products.push({id, price, discount});
  }
  saveProducts(products);
  closeModal();
  populateDiscountFilter();
  populateGenDiscount();
  applyFilters();
  showToast(origId ? '商品を更新しました' : '商品を追加しました');
}

function deleteProduct(id) {
  if (!confirm(`「${id}」を削除しますか？`)) return;
  products = products.filter(p => p.id !== id);
  saveProducts(products);
  populateDiscountFilter();
  populateGenDiscount();
  applyFilters();
  showToast('削除しました');
}

// ── GENERATE ──────────────────────────────────────────────────────────────
function generateCoupons() {
  const disc = +document.getElementById('gen-discount').value;
  const q = document.getElementById('gen-search').value.trim().toLowerCase();
  if (!disc) {
    document.getElementById('gen-output').style.display = 'none';
    document.getElementById('gen-summary').style.display = 'none';
    return;
  }
  let items = products.filter(p => p.discount === disc);
  if (q) items = items.filter(p => p.id.toLowerCase().includes(q));

  const ids = items.map(p => p.id);

  // Yahoo: comma-separated
  const yahoo = ids.join(',');
  // Rakuten: one per line
  const rakuten = ids.join('\n');
  // Shopify: comma-separated (same format, different platform)
  const shopify = ids.join('\n');

  document.getElementById('yahoo-output').textContent = yahoo;
  document.getElementById('rakuten-output').textContent = rakuten;
  document.getElementById('shopify-output').textContent = shopify;

  const start = document.getElementById('gen-start').value;
  const end = document.getElementById('gen-end').value;

  document.getElementById('gen-summary').style.display = 'block';
  document.getElementById('gen-summary').textContent =
    `割引額 ¥${disc.toLocaleString()} — ${ids.length} 件の商品  |  期間: ${start} 〜 ${end}`;

  document.getElementById('gen-output').style.display = 'block';

  lastGenerated = { discount: disc, start, end, ids };
}

function copyPlatform(platform) {
  const el = document.getElementById(`${platform}-output`);
  navigator.clipboard.writeText(el.textContent).then(() => showToast(`${platform} 用の商品番号をコピーしました`));
}

function saveToHistory() {
  if (!lastGenerated) return;
  const history = loadHistory();
  history.unshift({
    ...lastGenerated,
    savedAt: new Date().toISOString()
  });
  saveHistory(history);
  showToast('発行履歴に保存しました');
  renderHistory();
}

// ── HISTORY ───────────────────────────────────────────────────────────────
function renderHistory() {
  const history = loadHistory();
  const el = document.getElementById('history-content');
  if (history.length === 0) {
    el.innerHTML = '<div class="notice info">発行履歴はまだありません。クーポン生成タブで生成した後に保存できます。</div>';
    return;
  }
  el.innerHTML = '<div class="history-list">' + history.map((h, i) => {
    const saved = new Date(h.savedAt);
    const now = new Date();
    const startD = new Date(h.start), endD = new Date(h.end);
    endD.setHours(23,59,59);
    let status, statusLabel;
    if (now < startD) { status = 'upcoming'; statusLabel = '発行予定'; }
    else if (now > endD) { status = 'expired'; statusLabel = '終了'; }
    else { status = 'active'; statusLabel = '発行中'; }

    return `<div class="history-item">
      <div class="hist-header">
        <div>
          <span class="status-dot ${status}"></span>
          <span class="period">${h.start} 〜 ${h.end}</span>
          <span style="margin-left:8px;font-size:12px;color:var(--text-muted)">${statusLabel}</span>
        </div>
        <button class="btn-sm btn-danger" onclick="deleteHistory(${i})">削除</button>
      </div>
      <div class="hist-meta">
        割引額: <strong>¥${h.discount.toLocaleString()}</strong> &nbsp;|&nbsp;
        商品数: <strong>${h.ids.length} 件</strong> &nbsp;|&nbsp;
        保存日時: ${saved.toLocaleDateString('ja-JP')} ${saved.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}
      </div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-sm" onclick="reloadGenerate(${i})">クーポン生成に読み込む</button>
        <button class="btn-sm" onclick="copyHistoryYahoo(${i})">Yahoo コピー</button>
        <button class="btn-sm" onclick="copyHistoryRakuten(${i})">楽天 コピー</button>
        <button class="btn-sm" onclick="copyHistoryShopify(${i})">Shopify コピー</button>
      </div>
    </div>`;
  }).join('') + '</div>';
}

function deleteHistory(idx) {
  if (!confirm('この履歴を削除しますか？')) return;
  const h = loadHistory();
  h.splice(idx,1);
  saveHistory(h);
  renderHistory();
}

function reloadGenerate(idx) {
  const h = loadHistory()[idx];
  document.getElementById('gen-start').value = h.start;
  document.getElementById('gen-end').value = h.end;
  document.getElementById('gen-discount').value = h.discount;
  switchTab('generate');
  generateCoupons();
}

function copyHistoryYahoo(idx) {
  const h = loadHistory()[idx];
  navigator.clipboard.writeText(h.ids.join(',')).then(() => showToast('Yahoo 用コピーしました'));
}
function copyHistoryRakuten(idx) {
  const h = loadHistory()[idx];
  navigator.clipboard.writeText(h.ids.join('\n')).then(() => showToast('楽天 用コピーしました'));
}
function copyHistoryShopify(idx) {
  const h = loadHistory()[idx];
  navigator.clipboard.writeText(h.ids.join('\n')).then(() => showToast('Shopify 用コピーしました'));
}

function clearHistory() {
  if (!confirm('すべての履歴を削除しますか？')) return;
  saveHistory([]);
  renderHistory();
}

// ── TABS ──────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  ['products','generate','history'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === name ? '' : 'none';
  });
  if (name === 'history') renderHistory();
}

// ── CSV EXPORT ────────────────────────────────────────────────────────────
function exportCSV() {
  const rows = [['商品番号','販売価格','定額値引金額']];
  filtered.forEach(p => rows.push([p.id, p.price, p.discount]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `coupon_export_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── TOAST ──────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

init();
</script>
</body>
</html>
